<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports - PlotMap Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/crm-ui.css">
<script src="/admin/crm-data.js"></script>
<script src="/admin/core/data-adapter.js"></script>
<script src="/admin/core/sync-queue.js"></script>
<script src="/admin/core/finance-engine.js"></script>
<script src="/admin/core/command-engine.js"></script>
<script src="/admin/core/report-engine.js"></script>
<script src="/admin/core/event-tracker.js"></script>
<script src="/admin/core/access-control.js"></script>
<script src="/admin/crm-store.js"></script>
<script>
if (localStorage.getItem('plotmap_admin_role') !== 'dealer') {
  window.location.href = '/admin/index.html';
} else if (window.PMAccess) {
  window.PMAccess.guardPage({ roleRequired: 'owner' });
}
</script>
</head>
<body class="pm-shell">

<header class="pm-topbar dealer-bar">
  <div class="brand">PlotMap Admin</div>
  <div class="role-badge">Dealer Mode</div>
  <nav>
    <a href="/admin/owner.html">Dealer Command</a>
    <a href="/admin/area-intelligence.html">Area Intelligence</a>
    <a href="/admin/finance.html">Finance Center</a>
    <a href="/admin/reports.html" class="on">Reports</a>
    <a href="/admin/access.html">Access</a>
    <a href="/app/plotmap/" target="_blank">Presentation Map</a>
  </nav>
  <div class="sp"></div>
  <a href="/admin/index.html">Switch Role</a>
</header>

<main class="pm-main">
  <div class="pm-header" style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;">
    <div>
      <h1>Reports</h1>
      <div class="sub">Daily owner report generated from the command, finance, and inventory engines.</div>
    </div>
    <button class="pm-button primary" id="generate-report">Generate Daily Report</button>
  </div>

  <div class="pm-card" style="margin-bottom:24px;">
    <div class="pm-card-h">Latest Report</div>
    <div id="latest-report"></div>
  </div>

  <div class="pm-card">
    <div class="pm-card-h">Report History</div>
    <div class="pm-table-wrap">
      <table class="pm-table" id="reports-table">
        <thead><tr><th>Date</th><th>Type</th><th>Summary</th><th>Created</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function fmtDate(value) {
  if (!value) return '-';
  const date = new Date(value);
  return Number.isFinite(date.getTime()) ? date.toLocaleString() : '-';
}

function renderReport(report) {
  if (!report) return '<div style="color:var(--pm-text-mut)">No reports generated yet.</div>';
  const metrics = report.metricsJson || {};
  const priority = metrics.priorityClients || [];
  const leaks = metrics.missedOpportunities || [];
  const area = metrics.areaPulse && metrics.areaPulse[0];
  const inventory = metrics.inventorySignals || {};
  const money = metrics.moneyPending || {};
  return `
    <div style="font-size:15px;line-height:1.55;margin-bottom:18px;">${esc(report.aiText || report.summary || '')}</div>
    <div class="pm-grid cols-5">
      <div class="pm-metric-card"><div class="val">${priority.length}</div><div class="lbl">Call First</div></div>
      <div class="pm-metric-card"><div class="val">${leaks.length}</div><div class="lbl">Business Leaks</div></div>
      <div class="pm-metric-card"><div class="val">${esc(area ? area.name : '-')}</div><div class="lbl">Top Area</div></div>
      <div class="pm-metric-card"><div class="val">${Number(inventory.needsReview || 0)}</div><div class="lbl">Inventory Review</div></div>
      <div class="pm-metric-card"><div class="val">${Number(money.count || 0)}</div><div class="lbl">Money Pending</div></div>
    </div>
  `;
}

function renderReports() {
  const data = window.CRM.getCRM();
  const reports = (data.reports || []).slice().sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
  document.getElementById('latest-report').innerHTML = renderReport(reports[0]);
  document.querySelector('#reports-table tbody').innerHTML = reports.map(report => `
    <tr>
      <td>${esc(report.reportDate || '-')}</td>
      <td style="text-transform:capitalize">${esc(report.reportType || 'daily')}</td>
      <td>${esc(report.summary || '').slice(0, 180)}</td>
      <td>${fmtDate(report.createdAt)}</td>
    </tr>
  `).join('') || '<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--pm-text-mut)">No reports generated yet.</td></tr>';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('generate-report').addEventListener('click', () => {
    const dealer = window.CRM.getCRM().dealers[0];
    window.CRM.generateDailyOwnerReport(dealer && dealer.id);
    renderReports();
  });
  renderReports();
});
</script>
</body>
</html>
