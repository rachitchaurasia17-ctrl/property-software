<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Properties - PlotMap Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/crm-ui.css">
<script src="/admin/crm-data.js"></script>
<script src="/admin/crm-store.js"></script>
<script>
if (localStorage.getItem('plotmap_admin_role') !== 'team') {
  window.location.href = '/admin/index.html';
}
</script>
</head>
<body class="pm-shell">

<header class="pm-topbar">
  <div class="brand">PlotMap Admin</div>
  <div class="role-badge">Team Mode</div>
  <nav>
    <a href="/admin/team.html">Workspace</a>
    <a href="/admin/clients.html">Clients</a>
    <a href="/admin/properties.html" class="on">Properties</a>
    <a href="/admin/followups.html">Follow-ups</a>
    <a href="/admin/site-visits.html">Site Visits</a>
    <a href="/admin/deals.html">Deals</a>
    <a href="/admin/map-studio.html">Map Studio</a>
  </nav>
  <div class="sp"></div>
  <a href="/admin/index.html">Switch Role</a>
</header>

<main class="pm-main">
  <div class="pm-header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h1>Properties</h1>
        <div class="sub">Inventory and listings management.</div>
      </div>
      <button class="pm-button primary" onclick="document.getElementById('add-prop').style.display='block'">+ Add Property</button>
    </div>
  </div>
  
  <div class="pm-card" id="add-prop" style="display:none; margin-bottom:24px;">
    <div class="pm-card-h">Add New Property</div>
    <form class="pm-form" id="add-prop-form">
      <div class="pm-grid cols-2">
        <div class="fld"><label>Title</label><input type="text" id="p-title" required></div>
        <div class="fld"><label>Area</label><input type="text" id="p-area" required></div>
        <div class="fld"><label>Sector / Block</label><input type="text" id="p-sector"></div>
        <div class="fld"><label>Type</label><select id="p-type"><option>Residential Plot</option><option>Commercial SCO</option><option>Villa</option></select></div>
        <div class="fld"><label>Size</label><input type="text" id="p-size"></div>
        <div class="fld"><label>Internal Status</label><select id="p-status"><option>Available</option><option>Hold</option></select></div>
      </div>
      <div class="fld" style="margin-top:16px;">
        <button type="submit" class="pm-button primary" style="width:200px;">Save Property</button>
      </div>
    </form>
  </div>

  <div class="pm-card">
    <div class="pm-table-wrap">
      <table class="pm-table" id="prop-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Area / Sector</th>
            <th>Type / Size</th>
            <th>Status</th>
            <th>Map Pin</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const crm = window.CRM;
  const data = crm.getCRM();
  
  window.archiveProp = function(id) {
    crm.archiveProperty(id);
    window.location.reload();
  };
  
  const tbody = document.querySelector('#prop-table tbody');
  const props = data.properties.filter(p => p.internalStatus !== 'Archived');
  
  if(props.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6">No properties.</td></tr>';
  } else {
    tbody.innerHTML = props.map(p => `
      <tr>
        <td style="font-weight:700">${p.title}</td>
        <td>${p.area}<br><span style="font-size:12px;color:var(--pm-text-mut)">${p.sector||''}</span></td>
        <td>${p.type}<br><span style="font-size:12px;color:var(--pm-text-mut)">${p.size||''}</span></td>
        <td><span class="pm-status ${p.internalStatus==='Available'?'ok':'neutral'}">${p.internalStatus}</span></td>
        <td>${p.mapPinStatus==='Pinned'?'📍 Pinned':'❌ Unpinned'}</td>
        <td>
          <button class="pm-button ghost danger" style="padding:4px 8px;font-size:12px;" onclick="archiveProp('${p.id}')">Archive</button>
        </td>
      </tr>
    `).join('');
  }
  
  document.getElementById('add-prop-form').addEventListener('submit', (e) => {
    e.preventDefault();
    crm.addProperty({
      title: document.getElementById('p-title').value,
      area: document.getElementById('p-area').value,
      sector: document.getElementById('p-sector').value,
      type: document.getElementById('p-type').value,
      size: document.getElementById('p-size').value,
      internalStatus: document.getElementById('p-status').value
    });
    window.location.reload();
  });
});
</script>
</body>
</html>
