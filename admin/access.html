<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Control — PlotMap</title>
<link rel="stylesheet" href="/admin/crm-ui.css">
<script src="/admin/crm-data.js"></script>
<script src="/admin/core/data-adapter.js"></script>
<script src="/admin/core/sync-queue.js"></script>
<script src="/admin/core/finance-engine.js"></script>
<script src="/admin/core/command-engine.js"></script>
<script src="/admin/core/report-engine.js"></script>
<script src="/admin/core/event-tracker.js"></script>
<script src="/admin/core/access-control.js"></script>
<script src="/admin/crm-store.js"></script>
<script>
if (localStorage.getItem('plotmap_admin_role') !== 'dealer') {
  window.location.href = '/admin/index.html';
} else if (window.PMAccess) {
  window.PMAccess.guardPage({ roleRequired: 'owner' });
}
</script>
</head>
<body class="pm-shell">

<header class="pm-topbar dealer-bar">
  <a class="brand" href="/"><div class="brand-icon"><i></i></div><span class="brand-name">PlotMap</span></a>
  <nav>
    <a href="/admin/owner.html">Dashboard</a>
    <a href="/admin/property-insights.html">Property Insights</a>
    <a href="/admin/clients.html">Clients</a>
    <a href="/admin/finance.html">Finance</a>
    <a href="/admin/area-intelligence.html">Area Intelligence</a>
    <a href="/admin/reports.html">Reports</a>
    <a href="/admin/access.html" class="on">Access</a>
  </nav>
  <div class="sp"></div>
  <div class="role-chip" id="role-chip">
    <!-- JS -->
  </div>
</header>

<main class="pm-main">
  <div class="pm-page-header">
    <div>
      <h1>Access Control</h1>
      <div class="sub">Create trial links, monitor active users, and manage team access.</div>
    </div>
  </div>

  <div class="pm-grid wide-left" style="margin-bottom:24px;align-items:start;">
    <div class="pm-card-xl">
      <div class="pm-card-h">Create Trial / Demo Link</div>
      <form class="pm-form" id="link-form">
        <div class="fld"><label>Label</label><input id="link-label" type="text" value="Client Demo Link" required></div>
        <div class="pm-grid cols-3">
          <div class="fld"><label>Role</label><select id="link-role"><option value="viewer">Viewer</option><option value="team">Team</option><option value="owner">Owner</option></select></div>
          <div class="fld"><label>Expires</label><input id="link-expires" type="date" required></div>
          <div class="fld"><label>Max Uses</label><input id="link-uses" type="number" min="1" value="1" required></div>
        </div>
        <div style="margin-top:16px;">
          <button type="submit" class="pm-btn pm-btn-primary">Create Link</button>
        </div>
      </form>
    </div>

    <div class="pm-card-xl">
      <div class="pm-card-h">Active Users</div>
      <div id="user-summary" class="pm-grid cols-2" style="gap:12px;"></div>
    </div>
  </div>

  <div class="pm-card-xl" style="padding:0;overflow:hidden;margin-bottom:24px;">
    <div style="padding:20px 22px 10px 22px;">
      <div class="pm-card-h" style="margin:0;">Access Links</div>
    </div>
    <div class="pm-table-wrap">
      <table class="pm-table" id="links-table">
        <thead><tr><th>Link</th><th>Role</th><th>Expiry / Uses</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="pm-card-xl" style="padding:0;overflow:hidden;">
    <div style="padding:20px 22px 10px 22px;">
      <div class="pm-card-h" style="margin:0;">Users</div>
    </div>
    <div class="pm-table-wrap">
      <table class="pm-table" id="users-table">
        <thead><tr><th>User</th><th>Role</th><th>Last Seen</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function fmtDate(value) {
  if (!value) return '-';
  const date = new Date(value);
  return Number.isFinite(date.getTime()) ? date.toLocaleDateString() : '-';
}

function statusClass(status) {
  if (status === 'active') return 'ok';
  if (status === 'blocked' || status === 'removed' || status === 'revoked') return 'err';
  if (status === 'expired') return 'warn';
  return 'neutral';
}

function linkUrl(link) {
  return `${location.origin}/admin/index.html?access=${encodeURIComponent(link.token)}`;
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text);
  const input = document.createElement('textarea');
  input.value = text;
  document.body.appendChild(input);
  input.select();
  document.execCommand('copy');
  input.remove();
  return Promise.resolve();
}

function renderAccess() {
  const data = window.CRM.getCRM();
  const users = data.users || [];
  const links = data.accessLinks || [];
  const active = users.filter(user => user.status === 'active').length;
  const blocked = users.filter(user => ['blocked', 'expired', 'removed'].includes(user.status)).length;
  const activeLinks = links.filter(link => link.status === 'active').length;

  // Set role chip
  const ownerUser = users.find(u => u.role === 'owner');
  const ownerName = ownerUser ? ownerUser.name : 'Owner';
  document.getElementById('role-chip').innerHTML = `
    <div class="role-info"><div class="role-name">${ownerName.split(' ')[0]}</div><div class="role-kind">Owner</div></div>
    <div class="role-avatar" style="background:var(--pm-emerald);">${ownerName.charAt(0).toUpperCase()}</div>
  `;

  document.getElementById('user-summary').innerHTML = [
    ['Active Users', active, 'var(--pm-emerald)'],
    ['Active Links', activeLinks, 'var(--pm-blue)'],
    ['Blocked / Expired', blocked, 'var(--pm-orange)']
  ].map(item => `<div class="pm-stat-card" style="padding:12px;"><div class="stat-label"><span>${item[0]}</span></div><div class="stat-val" style="font-size:24px;color:${item[2]};">${item[1]}</div></div>`).join('');

  const linkRows = document.querySelector('#links-table tbody');
  linkRows.innerHTML = links.slice().sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)).map(link => `
    <tr>
      <td><div style="font-weight:700">${esc(link.label || 'Access Link')}</div><div style="font-size:12px;color:var(--pm-text-mut);font-family:monospace;">${esc(link.token)}</div></td>
      <td><span class="pm-tag">${esc(link.roleAllowed || 'viewer')}</span></td>
      <td>${fmtDate(link.expiresAt)}<br><span style="font-size:12px;color:var(--pm-text-mut)">${Number(link.useCount || 0)} / ${Number(link.maxUses || 0) || 'Unlimited'} used</span></td>
      <td><span class="pm-status ${statusClass(link.status)}">${esc(link.status || 'active')}</span></td>
      <td>
        <button class="pm-btn pm-btn-ghost sm" onclick="copyLink('${esc(link.id)}')">Copy</button>
        <button class="pm-btn pm-btn-ghost sm" onclick="extendLink('${esc(link.id)}')">+7d</button>
        <button class="pm-btn pm-btn-ghost sm" style="color:var(--pm-orange);" onclick="expireLink('${esc(link.id)}')">Expire</button>
        <button class="pm-btn pm-btn-ghost sm" style="color:var(--pm-err);" onclick="revokeLink('${esc(link.id)}')">Revoke</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="pm-empty" style="padding:24px;"><div class="desc">No links created yet.</div></td></tr>';

  const dealerById = Object.fromEntries((data.dealers || []).map(dealer => [dealer.id, dealer]));
  const userRows = document.querySelector('#users-table tbody');
  userRows.innerHTML = users.map(user => {
    const dealer = dealerById[user.dealerId] || {};
    return `
    <tr>
      <td><div style="font-weight:700">${esc(user.name || user.id)}</div><div style="font-size:12px;color:var(--pm-text-mut)">${esc(user.email || dealer.businessName || dealer.name || '')}</div></td>
      <td><span class="pm-tag">${esc(user.role || 'viewer')}</span></td>
      <td>${fmtDate(user.lastLogin || user.lastAccessCheck)}</td>
      <td><span class="pm-status ${statusClass(user.status)}">${esc(user.status || 'active')}</span></td>
      <td>
        <button class="pm-btn pm-btn-ghost sm" onclick="setUserStatus('${esc(user.id)}','active')">Unblock</button>
        <button class="pm-btn pm-btn-ghost sm" style="color:var(--pm-orange);" onclick="setUserStatus('${esc(user.id)}','expired')">Expire</button>
        <button class="pm-btn pm-btn-ghost sm" style="color:var(--pm-warn);" onclick="setUserStatus('${esc(user.id)}','blocked')">Block</button>
        <button class="pm-btn pm-btn-ghost sm" style="color:var(--pm-err);" onclick="setUserStatus('${esc(user.id)}','removed')">Remove</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="pm-empty" style="padding:24px;"><div class="desc">No users found.</div></td></tr>';
}

function copyLink(id) {
  const link = window.CRM.getCRM().accessLinks.find(item => item.id === id);
  if (!link) return;
  copyText(linkUrl(link)).then(() => alert('Access link copied.'));
}

function extendLink(id) { window.CRM.extendAccessLink(id, 7); renderAccess(); }
function expireLink(id) { window.CRM.expireAccessLink(id); renderAccess(); }
function revokeLink(id) { window.CRM.revokeAccessLink(id); renderAccess(); }
function setUserStatus(id, status) { window.CRM.updateUserStatus(id, status); renderAccess(); }

document.addEventListener('DOMContentLoaded', () => {
  const expiry = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
  document.getElementById('link-expires').value = expiry;
  document.getElementById('link-form').addEventListener('submit', event => {
    event.preventDefault();
    window.CRM.createAccessLink({
      label: document.getElementById('link-label').value.trim() || 'Trial Link',
      roleAllowed: document.getElementById('link-role').value,
      expiresAt: new Date(document.getElementById('link-expires').value + 'T23:59:59').toISOString(),
      maxUses: Number(document.getElementById('link-uses').value || 1),
      status: 'active'
    });
    renderAccess();
  });
  renderAccess();
});
</script>
</body>
</html>
