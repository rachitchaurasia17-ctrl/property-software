<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Section inactive - PlotMap</title>
<link rel="stylesheet" href="/admin/crm-ui.css">
</head>
<body class="pm-shell">
<main class="pm-main" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <section class="pm-card-xl" style="max-width:560px;text-align:center;">
    <div class="pm-serif" style="font-size:32px;font-weight:500;letter-spacing:-0.01em;">This section is not active in this version.</div>
    <div style="font-size:15px;color:var(--pm-text-mut);line-height:1.6;margin-top:10px;">PlotMap is focused on daily business, clients, properties and map activity.</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px;">
      <a class="pm-btn pm-btn-primary" href="/admin/owner.html">Dealer dashboard</a>
      <a class="pm-btn pm-btn-secondary" href="/admin/team.html">Team workspace</a>
    </div>
  </section>
</main>
<script>
const pmRole = localStorage.getItem('plotmap_admin_role');
if (pmRole === 'team') {
  document.querySelector('.pm-btn-primary').href = '/admin/team.html';
  document.querySelector('.pm-btn-primary').textContent = 'Team workspace';
}
</script>
</body>
</html>
