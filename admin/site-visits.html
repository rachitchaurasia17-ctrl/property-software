<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Visits - PlotMap Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/crm-ui.css">
<script src="/admin/crm-data.js"></script>
<script src="/admin/crm-store.js"></script>
</head>
<body class="pm-shell">

<header class="pm-topbar">
  <div class="brand">PlotMap Admin</div>
  <div class="role-badge">Team Mode</div>
  <nav>
    <a href="/admin/team.html">Workspace</a>
    <a href="/admin/clients.html">Clients</a>
    <a href="/admin/properties.html">Properties</a>
    <a href="/admin/followups.html">Follow-ups</a>
    <a href="/admin/site-visits.html" class="on">Site Visits</a>
    <a href="/admin/deals.html">Deals</a>
    <a href="/admin/map-studio.html">Map Studio</a>
  </nav>
  <div class="sp"></div>
  <a href="/admin/index.html">Switch Role</a>
</header>

<main class="pm-main">
  <div class="pm-header">
    <h1>Site Visits</h1>
    <div class="sub">Track client visits and property viewings.</div>
  </div>
  
  <div class="pm-card">
    <div class="pm-table-wrap">
      <table class="pm-table" id="sv-table">
        <thead>
          <tr>
            <th>Date / Time</th>
            <th>Client</th>
            <th>Property / Area</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const crm = window.CRM;
  const data = crm.getCRM();
  
  const tbody = document.querySelector('#sv-table tbody');
  
  window.markStatus = function(id, status) {
    crm.updateSiteVisitStatus(id, status);
    window.location.reload();
  };
  
  if(data.siteVisits.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6">No site visits.</td></tr>';
  } else {
    tbody.innerHTML = data.siteVisits.map(s => {
      const c = data.clients.find(c => c.id === s.clientId) || {};
      const p = data.properties.find(p => p.id === s.propertyId) || {};
      const d = new Date(s.dateTime);
      return `
      <tr>
        <td style="font-weight:600">${d.toLocaleDateString()} <span style="color:var(--pm-text-light)">${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></td>
        <td style="font-weight:700">${c.name || '-'}</td>
        <td>${p.title || '-'}<br><span style="font-size:12px;color:var(--pm-text-mut)">${s.area||''}</span></td>
        <td><span class="pm-status ${s.status==='completed'?'ok':s.status==='cancelled'?'err':'neutral'}">${s.status}</span></td>
        <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${s.notes}">${s.notes}</td>
        <td>
          ${s.status === 'scheduled' ? `<button class="pm-button ghost" style="padding:4px 8px;font-size:12px;" onclick="markStatus('${s.id}', 'completed')">Mark Done</button>` : ''}
        </td>
      </tr>
      `;
    }).join('');
  }
});
</script>
</body>
</html>
