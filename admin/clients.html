<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clients - PlotMap Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/crm-ui.css">
<script src="/admin/crm-data.js"></script>
<script src="/admin/core/data-adapter.js"></script>
<script src="/admin/core/sync-queue.js"></script>
<script src="/admin/core/finance-engine.js"></script>
<script src="/admin/core/command-engine.js"></script>
<script src="/admin/core/report-engine.js"></script>
<script src="/admin/core/event-tracker.js"></script>
<script src="/admin/core/access-control.js"></script>
<script src="/admin/crm-store.js"></script>
<script>
if (localStorage.getItem('plotmap_admin_role') !== 'team') {
  window.location.href = '/admin/index.html';
} else if (window.PMAccess) {
  window.PMAccess.guardPage({ roleRequired: 'team' });
}
</script>
</head>
<body class="pm-shell">

<header class="pm-topbar">
  <div class="brand">PlotMap Admin</div>
  <div class="role-badge">Team Mode</div>
  <nav>
    <a href="/admin/team.html">Workspace</a>
    <a href="/admin/clients.html" class="on">Clients</a>
    <a href="/admin/properties.html">Properties</a>
    <a href="/admin/followups.html">Follow-ups</a>
    <a href="/admin/site-visits.html">Site Visits</a>
    <a href="/admin/deals.html">Deals</a>
    <a href="/admin/map-studio.html">Map Studio</a>
  </nav>
  <div class="sp"></div>
  <a href="/admin/index.html">Switch Role</a>
</header>

<main class="pm-main">
  <div class="pm-header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h1>Clients</h1>
        <div class="sub">Manage buyers, sellers, and investors.</div>
      </div>
      <button class="pm-button primary" onclick="document.getElementById('add-client').style.display='block'">+ Add Client</button>
    </div>
  </div>

  <div class="pm-card" id="add-client" style="display:none; margin-bottom:24px;">
    <div class="pm-card-h">Add New Client</div>
    <form class="pm-form" id="add-client-form">
      <div class="pm-grid cols-2">
        <div class="fld"><label>Name</label><input type="text" id="c-name" required></div>
        <div class="fld"><label>Phone</label><input type="tel" id="c-phone" required></div>
        <div class="fld"><label>Client Type</label><select id="c-type"><option>Buyer</option><option>Seller</option><option>Investor</option></select></div>
        <div class="fld"><label>Interested Area</label><input type="text" id="c-area"></div>
        <div class="fld"><label>Property Type</label><input type="text" id="c-ptype"></div>
        <div class="fld"><label>Size Requirement</label><input type="text" id="c-size"></div>
      </div>
      <div class="fld" style="margin-top:16px;">
        <button type="submit" class="pm-button primary" style="width:200px;">Save Client</button>
      </div>
    </form>
  </div>
  
  <div class="pm-card" style="margin-bottom:20px;">
    <div class="pm-card-h">All Clients</div>
    <div class="pm-table-wrap">
      <table class="pm-table" id="clients-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Type</th>
            <th>Area / Req</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const crm = window.CRM;
  const data = crm.getCRM();
  
  const tbody = document.querySelector('#clients-table tbody');
  
  window.markStatus = function(id, status) {
    crm.updateClientStatus(id, status);
    window.location.reload();
  };
  
  function statusClass(s) {
    if (s === 'Closed') return 'ok';
    if (s === 'Warm' || s === 'Property Shared' || s === 'Negotiation') return 'warn';
    if (s === 'Site Visit Planned') return 'info';
    if (s === 'Not Answering') return 'err';
    if (s === 'New') return 'neutral';
    if (s === 'Future Client') return 'purple';
    return 'neutral';
  }

  if(data.clients.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="padding:24px; text-align:center; color:var(--pm-text-mut);">No clients yet. Click "+ Add Client" to start.</td></tr>';
    return;
  }
  
  tbody.innerHTML = data.clients.map(c => `
    <tr>
      <td style="font-weight:700">${c.name}</td>
      <td>${c.phone}</td>
      <td style="text-transform:capitalize">${c.type || '-'}</td>
      <td>${c.interestedArea || '-'}<br><span style="font-size:12px;color:var(--pm-text-mut)">${c.propertyType||''} ${c.sizeRequirement||''}</span></td>
      <td><span class="pm-status ${statusClass(c.status)}">${c.status}</span></td>
      <td>
        <select style="font-size:12px; padding:4px 6px; border:1px solid var(--pm-border); border-radius:6px; font-family:inherit; cursor:pointer;" onchange="markStatus('${c.id}', this.value)">
          <option value="" disabled selected>Change…</option>
          <option value="New">New</option>
          <option value="Warm">Warm</option>
          <option value="Property Shared">Property Shared</option>
          <option value="Site Visit Planned">Site Visit Planned</option>
          <option value="Negotiation">Negotiation</option>
          <option value="Not Answering">Not Answering</option>
          <option value="Closed">Closed</option>
        </select>
      </td>
    </tr>
  `).join('');

  document.getElementById('add-client-form').addEventListener('submit', (e) => {
    e.preventDefault();
    crm.addClient({
      name: document.getElementById('c-name').value,
      phone: document.getElementById('c-phone').value,
      type: document.getElementById('c-type').value,
      interestedArea: document.getElementById('c-area').value,
      propertyType: document.getElementById('c-ptype').value,
      sizeRequirement: document.getElementById('c-size').value,
      status: 'New',
      assignedStaff: 's1'
    });
    window.location.reload();
  });
});
</script>
</body>
</html>
