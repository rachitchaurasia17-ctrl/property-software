<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlotMap — Highlight Sets Editor (A/B/C/D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500;560&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* AEROCITY_BUTTONS_LAYOUT design tokens */
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#EAE0CC;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#23211C;}
  .shell{position:absolute;inset:0;display:flex;flex-direction:column;}
  .topbar{flex:none;height:60px;background:#0B1A36;display:flex;align-items:center;gap:14px;padding:0 20px;color:#FBF6EA;}
  .logo{width:28px;height:28px;border-radius:8px;background:#FBF6EA;display:flex;align-items:center;justify-content:center;}
  .logo i{width:10px;height:10px;border-radius:50%;border:3px solid #0B1A36;}
  .brand{font-weight:760;font-size:16px;letter-spacing:-.2px;}
  .brand small{font-weight:600;opacity:.6;font-size:12px;margin-left:6px;}
  .top-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .admin-nav{display:flex;gap:2px;margin-left:10px;}
  .admin-nav a{color:rgba(251,246,234,.7);text-decoration:none;font-weight:650;font-size:13.5px;padding:8px 13px;border-radius:9px;cursor:pointer;}
  .admin-nav a:hover{background:rgba(251,246,234,.12);color:#fff;}
  .admin-nav a.on{background:rgba(251,246,234,.16);color:#fff;}
  .body{flex:1;display:flex;min-height:0;}
  /* LEFT RAIL */
  .rail{width:380px;flex:none;background:#FBF6EA;border-right:1px solid #E6DCC8;display:flex;flex-direction:column;min-height:0;}
  .rail .head{padding:20px 22px 12px;}
  .eyebrow{font-size:11.5px;font-weight:700;color:#B07A2B;text-transform:uppercase;letter-spacing:1.1px;}
  .h1{font-family:'Newsreader',serif;font-size:27px;font-weight:560;letter-spacing:-.5px;margin-top:5px;}
  .sub{font-size:13px;color:#9C957F;font-weight:550;margin-top:6px;line-height:1.4;}
  .letters{display:flex;gap:8px;padding:4px 22px 12px;}
  .letter{flex:1;height:48px;border-radius:13px;border:1px solid #E1D6BF;background:#fff;font-size:18px;font-weight:800;color:#3F3A30;cursor:pointer;transition:.15s;position:relative;}
  .letter:hover{border-color:#0B1A36;}
  .letter.on{background:#0B1A36;color:#fff;border-color:#0B1A36;box-shadow:0 4px 12px rgba(11,26,54,.25);}
  .letter .cnt{position:absolute;top:5px;right:8px;font-size:10px;font-weight:700;opacity:.7;}
  .scroll{flex:1;overflow-y:auto;padding:8px 18px 18px;}
  .group{margin-top:14px;}
  .glabel{font-size:11.5px;font-weight:700;color:#A89F89;text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .item-chip{display:inline-flex;align-items:center;background:#fff;border:1px solid #EBE1CC;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:640;color:#3F3A30;cursor:pointer;transition:all .18s cubic-bezier(.2,0,0,1);box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .item-chip:hover{border-color:#16356A;color:#16356A;transform:translateY(-1px);background:#F8FAFC;}
  .item-chip.act{border-color:#0B1A36;background:#0B1A36;color:#fff;box-shadow:0 4px 10px rgba(11,26,54,.25);}
  .foot{flex:none;padding:16px 22px;border-top:1px solid #EEE4CF;background:#F5EEDD;display:flex;align-items:center;gap:12px;}
  .btn-primary{border:none;border-radius:13px;background:#0B1A36;color:#fff;font-weight:720;cursor:pointer;height:46px;padding:0 22px;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary:hover{background:#1B3F7C;}
  .btn-primary:disabled{background:#C9BCA0;cursor:default;}
  .btn-ghost{border:1px solid #E2D7C0;border-radius:13px;background:#fff;font-weight:680;color:#23211C;cursor:pointer;height:46px;padding:0 18px;font-size:14px;}
  .btn-ghost:hover{border-color:#0B1A36;}
  .status{font-size:13px;font-weight:650;color:#1C8A57;}
  .status.err{color:#B5604F;}
  .status.warn{color:#9C8B62;}
  /* MAP */
  .stage{flex:1;position:relative;background:#0B1A36;display:flex;align-items:center;justify-content:center;overflow:hidden;min-width:0;}
  .maphint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(11,26,54,.78);color:#EAF6FB;font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:11px;z-index:5;}
  .mapframe{position:relative;width:96%;height:92%;}
  .mapframe img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;border-radius:10px;}
  .mapframe svg{position:absolute;inset:0;width:100%;height:100%;}
  .ov-road{fill:none;stroke:#16356A;stroke-width:9;opacity:.22;cursor:pointer;stroke-linecap:round;transition:.15s;}
  .ov-road:hover{opacity:.55;stroke-width:12;}
  .ov-road.sel{stroke:#E0B04A;stroke-width:17;opacity:1;filter:drop-shadow(0 0 7px rgba(224,176,74,.85));}
  .ov-area{fill:rgba(22,53,106,.05);stroke:#16356A;stroke-width:2;opacity:.45;cursor:pointer;transition:.15s;}
  .ov-area:hover{opacity:.8;fill:rgba(22,53,106,.12);}
  .ov-area.sel{fill:rgba(224,176,74,.4);stroke:#C8902B;stroke-width:4;opacity:1;filter:drop-shadow(0 0 6px rgba(224,176,74,.6));}
  .ov-hit{fill:none;stroke:rgba(0,0,0,0);stroke-width:40;cursor:pointer;}
  .empty{padding:30px 6px;color:#A89F89;font-size:13px;font-weight:600;text-align:center;}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="logo"><i></i></span><span class="brand">PlotMap <small>Admin</small></span>
    <nav class="admin-nav">
      <a href="/admin/maps.html#dash">Command Center</a>
      <a href="/admin/maps.html#maps">Sector Maps</a>
      <a href="/admin/maps.html#pins">Pin Manager</a>
      <a href="/admin/editor.html" class="on">Highlight Sets</a>
    </nav>
    <div class="top-actions"><a class="btn-ghost" href="/app/plotmap/" style="text-decoration:none;display:inline-flex;align-items:center">↗ Open site</a></div>
  </div>
  <div class="body">
    <div class="rail">
      <div class="head">
        <div class="eyebrow">Shortcut buttons</div>
        <div class="h1">Maps A · B · C · D</div>
        <div class="sub">Pick a button, then click the items on the map (or the chips below) to set what it highlights. Save publishes to the live site.</div>
      </div>
      <div class="letters" id="letters"></div>
      <div class="scroll" id="list"></div>
      <div class="foot">
        <button class="btn-primary" id="saveBtn">Save to site</button>
        <button class="btn-ghost" id="clearBtn">Clear set</button>
        <span class="status" id="status"></span>
      </div>
    </div>
    <div class="stage">
      <div class="maphint" id="hint">Loading map…</div>
      <div class="mapframe" id="frame" style="display:none">
        <img id="mapImg" alt="Original masterplan">
        <svg id="ov" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app/plotmap/data.js"></script>
<script src="/app/plotmap/datasets/tricity.dataset.js"></script>
<script>
(async function(){
  const SUPABASE_URL = 'https://czmkfmkmgqlienmdihul.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DGqcs0JaDVgzImUGGgg_FQ_Q_SkgnhX';
  const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
  const $ = s => document.querySelector(s);
  const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const LETTERS = ['A','B','C','D'];

  const PM = window.PM;
  const DS = PM && (PM.datasets['tricity-aerotropolis'] || Object.values(PM.datasets)[0]);
  const geo = await fetch('/app/plotmap/geo.json').then(r=>r.json()).catch(()=>({viewBox:'0 0 4599 3069',paths:{}}));
  const PATHS = geo.paths || {};

  // build verified item list (only items whose svgId exists in geo.paths)
  const catLabel = id => (PM.categories.find(c=>c.id===id)||{}).label || id;
  const items = [];
  (DS.keyRoads||[]).forEach(r => { if(r.svgId && PATHS[r.svgId]) items.push({ id:r.id, name:r.name, svgId:r.svgId, group:'Key Roads', kind:'road' }); });
  (DS.blocks||[]).forEach(b => { if(b.svgId && PATHS[b.svgId]) items.push({ id:b.id, name:b.name, svgId:b.svgId, group:catLabel(b.cat), kind:'area' }); });
  (DS.zones||[]).forEach(z => { if(z.svgId && PATHS[z.svgId]) items.push({ id:z.id, name:z.name, svgId:z.svgId, group:catLabel(z.cat), kind:'area' }); });
  (DS.pins||[]).forEach(p => { if(p.svgId && PATHS[p.svgId]) items.push({ id:p.id, name:p.name, svgId:p.svgId, group:catLabel(p.cat), kind:'area' }); });
  const itemById = Object.fromEntries(items.map(i=>[i.id,i]));

  // state
  let active = 'A';
  const sets = { A:new Set(), B:new Set(), C:new Set(), D:new Set() };
  let rows = [];

  // setup map
  $('#mapImg').src = (DS.assets && DS.assets.original) || '';
  $('#ov').setAttribute('viewBox', geo.viewBox || '0 0 4599 3069');
  $('#frame').style.display = '';
  $('#hint').textContent = 'Click items on the map to add them to set ' + active;

  function renderLetters(){
    $('#letters').innerHTML = LETTERS.map(L=>`<button class="letter ${active===L?'on':''}" data-L="${L}">${L}<span class="cnt">${sets[L].size||''}</span></button>`).join('');
    document.querySelectorAll('[data-L]').forEach(b=>b.onclick=()=>{ active=b.getAttribute('data-L'); $('#hint').textContent='Click items on the map to add them to set '+active; renderAll(); });
  }
  function renderMap(){
    const set = sets[active];
    const ov = $('#ov');
    const shapes = items.map(it=>{
      const d = PATHS[it.svgId]; const on = set.has(it.id);
      if(it.kind==='road') return `<path d="${d}" class="ov-road ${on?'sel':''}" data-id="${it.id}"/><path d="${d}" class="ov-hit" data-id="${it.id}"/>`;
      return `<path d="${d}" class="ov-area ${on?'sel':''}" data-id="${it.id}"/>`;
    }).join('');
    ov.innerHTML = shapes;
    ov.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>toggle(el.getAttribute('data-id')));
  }
  function renderList(){
    const groups = {};
    items.forEach(it=>{ (groups[it.group]=groups[it.group]||[]).push(it); });
    const set = sets[active];
    const html = Object.keys(groups).map(g=>`<div class="group"><div class="glabel">${esc(g)}</div><div class="chips">${
      groups[g].map(it=>`<button class="item-chip ${set.has(it.id)?'act':''}" data-id="${it.id}">${esc(it.name)}</button>`).join('')
    }</div></div>`).join('');
    $('#list').innerHTML = html || '<div class="empty">No verified items found for this map.</div>';
    $('#list').querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>toggle(el.getAttribute('data-id')));
  }
  function renderAll(){ renderLetters(); renderMap(); renderList(); }
  function toggle(id){ const s=sets[active]; s.has(id)?s.delete(id):s.add(id); renderAll(); markDirty(); }

  function status(msg, cls){ const s=$('#status'); s.textContent=msg||''; s.className='status'+(cls?' '+cls:''); }
  function markDirty(){ status('Unsaved changes', 'warn'); }

  // Supabase load
  async function load(){
    if(!sb){ status('Supabase unavailable — selections won’t save', 'err'); renderAll(); return; }
    const { data, error } = await sb.from('prebuilt_maps').select('*');
    if(error){ status('Load failed: '+error.message, 'err'); renderAll(); return; }
    rows = data || [];
    LETTERS.forEach(L=>{ const r=rows.find(x=>String(x.label||'').trim().toUpperCase()===L); sets[L]=new Set(r && Array.isArray(r.blocks)?r.blocks.filter(id=>itemById[id]):[]); });
    renderAll(); status('Loaded', '');
  }
  // Supabase save (upsert by label)
  async function save(){
    if(!sb){ status('Supabase unavailable', 'err'); return; }
    $('#saveBtn').disabled = true; status('Saving…','warn');
    try{
      for(const L of LETTERS){
        const blocks=[...sets[L]];
        const existing = rows.find(r=>String(r.label||'').trim().toUpperCase()===L);
        if(existing){ const {error}=await sb.from('prebuilt_maps').update({label:L,blocks}).eq('id',existing.id); if(error) throw error; existing.blocks=blocks; }
        else { const {data,error}=await sb.from('prebuilt_maps').insert({label:L,blocks}).select(); if(error) throw error; if(data&&data[0]) rows.push(data[0]); }
      }
      status('Saved ✓ — live on the site', '');
    }catch(e){ status('Save failed: '+(e.message||e), 'err'); }
    $('#saveBtn').disabled = false;
  }
  $('#saveBtn').onclick = save;
  $('#clearBtn').onclick = ()=>{ sets[active].clear(); renderAll(); markDirty(); };

  if(!DS){ $('#hint').textContent='Could not load the map dataset.'; }
  else { renderAll(); load(); }
})();
</script>
</body>
</html>
